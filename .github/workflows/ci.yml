name: build-exe

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '7.0.x'

    - name: Publish project (make EXE)
      run: |
        dotnet publish eleven-percent/eleven-percent.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true

    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: ElevenPercent-EXE
        path: eleven-percent\bin\Release\net7.0-windows\win-x64\publish\
